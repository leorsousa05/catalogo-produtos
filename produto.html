<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto — L'Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="grain-overlay" aria-hidden="true"></div>

  <main class="product-detail">
    <div class="container">
      <nav class="breadcrumbs" aria-label="Breadcrumb">
        <a href="index.html">Início</a>
        <span aria-hidden="true"> / </span>
        <a id="breadcrumb-category" href="index.html">Categoria</a>
        <span aria-hidden="true"> / </span>
        <span id="breadcrumb-title">Produto</span>
      </nav>

      <div id="loading-state" class="loading-message">Curando objeto...</div>

      <div id="product-content" class="detail-grid" hidden>
        <div class="detail-gallery">
          <div class="detail-main-image">
            <img id="main-image" src="" alt="">
          </div>
          <div id="thumbnails" class="detail-thumbnails"></div>
        </div>

        <div class="detail-info">
          <p id="product-category" class="detail-info-category">Categoria</p>
          <h1 id="product-title" class="detail-info-title">Título do Produto</h1>
          <p id="product-price" class="detail-info-price">US$ 0,00</p>
          <p id="product-description" class="detail-info-desc">Descrição do produto.</p>

          <ul class="detail-specs">
            <li><span>Marca</span> <span id="spec-brand">—</span></li>
            <li><span>Avaliação</span> <span id="spec-rating">—</span></li>
            <li><span>Estoque</span> <span id="spec-stock">—</span></li>
          </ul>

          <div class="quantity-stepper" aria-label="Quantidade">
            <button id="qty-minus" aria-label="Diminuir quantidade" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>
            </button>
            <input id="qty-input" type="number" value="1" min="1" max="99" aria-label="Quantidade">
            <button id="qty-plus" aria-label="Aumentar quantidade" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
          </div>

          <button id="btn-add-cart" class="btn-primary btn-full" type="button">Adicionar à sacola</button>
        </div>
      </div>

      <div id="error-state" class="error-state" hidden>
        <p class="error-title">Objeto não encontrado</p>
        <p class="error-text">Não conseguimos localizar este produto no acervo.</p>
        <a href="index.html" class="btn-secondary">Voltar ao catálogo</a>
      </div>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/produto.js"></script>
</body>
</html>
